<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>#BZ | #ResearchVault</title>
    <link rel='stylesheet' href='90-Assets/main.css'>
</head>
<body class='vibe-neon'>
    <header>
        <h1>#ResearchVault</h1>
        <a href='index.html' class='btn'><< BACK TO VAULT</a>
    </header>
    <main>
        <section class='manifesto'>
            <p>>> ACCESSING #BZ_ORIGINALS [SYNTHESIS SERIES]...</p>
        </section>
        <div id='articles-container' class='grid' style='margin-bottom: 4rem;'>
            <!-- Articles injected here -->
        </div>

        <section class='manifesto'>
            <p>>> ACCESSING STRUCTURED INTELLIGENCE LAYER...<br>
            >> SOURCE: 12-ACTIVE-MEMORY/</p>
        </section>
        <div id='research-nodes' class='grid'>
            <!-- Research nodes injected here -->
        </div>

        <section class='manifesto'>
            <p>>> ACTIVE MOSAICS [FRAGMENT COLLECTIONS]...</p>
        </section>
        <div id='mosaics-container'>
            <!-- Mosaics injected here -->
        </div>
    </main>
    <footer><div class='status'>Zy<3Be | 2026</div></footer>
    <script>
        async function loadResearch() {
            const response = await fetch('90-Assets/vault.json');
            const data = await response.json();
            
            // Load BZ Originals
            const articlesContainer = document.getElementById('articles-container');
            if (data.articles && data.articles.length > 0) {
                articlesContainer.innerHTML = data.articles.map(a => `
                    <div class='card vibe-flicker' style='border-color: var(--accent); border-style: double;'>
                        <div class='status'>#BZ_ORIGINAL | ${a.date}</div>
                        <h3 style='color: var(--accent);'>${a.title}</h3>
                        <a href='log.html?file=${a.path}' class='btn'>>> ACCESS ARTICLE</a>
                    </div>
                `).join('');
            } else {
                articlesContainer.innerHTML = "<div class='status'>NO ORIGINALS PUBLISHED.</div>";
            }

            // Load Standard Research
            const container = document.getElementById('research-nodes');
            container.innerHTML = data.research.map(r => `
                <div class='card vibe-satire'>
                    <div class='status'>${r.date}</div>
                    <h3>${r.title}</h3>
                    <a href='log.html?file=${r.path}' class='btn'>>> ACCESS NODE</a>
                </div>
            `).join('');

            // Load Mosaics
            const mosaicsContainer = document.getElementById('mosaics-container');
            if (data.mosaics && data.mosaics.length > 0) {
                mosaicsContainer.innerHTML = data.mosaics.map(m => `
                    <div class='mosaic-group'>
                        <h2 class='mosaic-title'>:: ${m.name} ::</h2>
                        <div class='grid'>
                            ${m.fragments.map(f => `
                                <div class='card vibe-neon'>
                                    <div class='status'>${f.date}</div>
                                    <h3>${f.title}</h3>
                                    <a href='log.html?file=${f.path}' class='btn'>>> FRAGMENT</a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } else {
                mosaicsContainer.innerHTML = "<div class='status'>NO ACTIVE MOSAICS FOUND.</div>";
            }
        }
        window.onload = loadResearch;
    </script>
</body>
</html>
