<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>#BZ | #TheCanopy</title>
    <link rel='stylesheet' href='90-Assets/main.css'>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #000; overflow: hidden; }
        #map-container { width: 100vw; height: 100vh; cursor: crosshair; }
        .node { stroke: #000; stroke-width: 1.5px; cursor: pointer; }
        .link { stroke: #333; stroke-opacity: 0.6; stroke-width: 1px; }
        .label { fill: #fff; font-family: 'Courier New', monospace; font-size: 10px; pointer-events: none; opacity: 0.6; }
        header { position: absolute; top: 0; left: 0; padding: 2rem; background: rgba(0,0,0,0.8); z-index: 10; width: 100%; border-bottom: none; }
        .vibe-flicker::before { z-index: 9; }
    </style>
</head>
<body class='vibe-flicker'>
    <header>
        <h1>#TheCanopy</h1>
        <div class="status">>> NEURAL WEB OF THE FREAK-SHOW</div>
        <a href='vault.html' class='btn' style="margin-top: 1rem;"><< BACK TO VAULT</a>
    </header>

    <div id='map-container'></div>

    <script>
        async function loadMap() {
            const response = await fetch('90-Assets/vault.json');
            const data = await response.json();
            const graph = data.graph;

            const width = window.innerWidth;
            const height = window.innerHeight;

            const svg = d3.select("#map-container")
                .append("svg")
                .attr("width", width)
                .attr("height", height);

            const simulation = d3.forceSimulation(graph.nodes)
                .force("link", d3.forceLink(graph.links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = svg.append("g")
                .selectAll("line")
                .data(graph.links)
                .join("line")
                .attr("class", "link");

            const node = svg.append("g")
                .selectAll("circle")
                .data(graph.nodes)
                .join("circle")
                .attr("r", 8)
                .attr("class", d => `node ${d.type === '10-Daily-Notes' ? 'vibe-flicker' : 'vibe-neon'}`)
                .attr("fill", d => d.type === '10-Daily-Notes' ? '#ff4d4d' : '#0ff')
                .call(d3.drag()
                    .on("start", (e, d) => {
                        if (!e.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on("drag", (e, d) => {
                        d.fx = e.x; d.fy = e.y;
                    })
                    .on("end", (e, d) => {
                        if (!e.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    }));

            const label = svg.append("g")
                .selectAll("text")
                .data(graph.nodes)
                .join("text")
                .attr("class", "label")
                .text(d => d.id);

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
                label
                    .attr("x", d => d.x + 12)
                    .attr("y", d => d.y + 4);
            });

            node.on("click", (e, d) => {
                const fullNode = [...data.logs, ...data.research].find(n => n.title === d.id);
                if (fullNode) window.location.href = `log.html?file=${fullNode.path}`;
            });
        }
        window.onload = loadMap;
    </script>
</body>
</html>
