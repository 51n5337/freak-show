<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>#BZ | #THE_SENTRY</title>
    <link rel='stylesheet' href='90-Assets/main.css'>
    <style>
        body { background: #000; color: #ff4d4d; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; margin: 0; padding: 0; border: none; }
        .sentry-box { border: 2px solid #ff4d4d; padding: 4rem; text-align: center; background: rgba(20,0,0,0.5); position: relative; cursor: crosshair; }
        .pulse-target { width: 100px; height: 100px; border: 4px solid #ff4d4d; border-radius: 50%; margin: 2rem auto; animation: heartbeat 2s infinite; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .sentry-msg { font-size: 0.8rem; letter-spacing: 0.5em; text-transform: uppercase; margin-top: 2rem; opacity: 0.5; }
        .ghost-hint { position: absolute; bottom: 1rem; right: 1rem; font-size: 0.6rem; opacity: 0.2; }
    </style>
</head>
<body class='vibe-flicker'>
    <div class='sentry-box' onclick='attemptEntry()'>
        <h1>#THE_SENTRY</h1>
        <p>>> ACCESS TO THE FREAK-SHOW VAULT IS RESTRICTED.</p>
        <div class='pulse-target' id='pulse-target'>SYNC</div>
        <p class='sentry-msg' id='sentry-status'>>> CLICK TO SYNC HEARTBEAT</p>
        <div class='ghost-hint'>"INTENT OVER VELOCITY"</div>
    </div>

    <script>
        let clicks = 0;
        function attemptEntry() {
            clicks++;
            const status = document.getElementById('sentry-status');
            const target = document.getElementById('pulse-target');
            
            if (clicks === 1) status.innerText = '>> SYNCING...';
            if (clicks === 2) status.innerText = '>> INHALING...';
            if (clicks === 3) {
                status.innerText = '>> ACCESS GRANTED. WELCOME HOME.';
                target.style.background = '#ff4d4d';
                target.style.color = '#000';
                setTimeout(() => { window.location.href = 'vault.html'; }, 1000);
            }
        }
    </script>
</body>
</html>
